<!doctype html>

    <title>Entrenamiento de Fútbol Sala</title>
    <script>
      // Safeguard against third-party scripts throwing "Converting circular structure to JSON"
      (function() {
        const originalStringify = JSON.stringify;
        JSON.stringify = function(value, replacer, space) {
          try {
            return originalStringify(value, replacer, space);
          } catch (e) {
            try {
              const seen = new WeakSet();
              return originalStringify(value, function(key, val) {
                if (typeof val === 'object' && val !== null) {
                  if (seen.has(val)) {
                    return '[Circular]';
                  }
                  seen.add(val);
                }
                if (replacer) {
                  return replacer(key, val);
                }
                return val;
              }, space);
            } catch (innerErr) {
              return 'null';
            }
          }
        };
      })();

      window.pixelId = "6a355a4ac0426d6bda378b12";
      var a = document.createElement("script");
      a.setAttribute("async", "");
      a.setAttribute("defer", "");
      a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
      document.head.appendChild(a);
    </script>
    <script
      src="https://cdn.utmify.com.br/scripts/utms/latest.js"
      data-utmify-prevent-subids
      async
      defer
    ></script>
